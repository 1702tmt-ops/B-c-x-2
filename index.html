<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauge Nhiệt độ THREP</title></script></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .temperature-gauge-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .gauge-title {
            font-size: 1.8rem;
            color: #212121;
            margin-bottom: 30px;
            font-weight: 500;
        }
        #gauge-temperature {
            width: 350px;
            height: 350px;
        }
        .temp-value {
            font-size: 3.2rem;
            font-weight: 600;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -30%);
            color: #2E7D32;
        }
        .temp-unit {
            font-size: 1.2rem;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="temperature-gauge-container">
        <h2 class="gauge-title">Nhiệt độ</h2>
            <div id="gauge-temperature"></div>
            <div class="temp-value">
                <span id="current-temp">29.9</span>
                <span class="temp-unit">°C</span>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình gauge nhiệt độ
        const gauge = new Gauge(document.getElementById('gauge-temperature')).setOptions({
            angle: 0.15,
            lineWidth: 0.4,
            pointer: {
                length: 0.6,
                strokeWidth: 0.03,
                color: '#000000'
            },
            limitMax: true,
            colorStart: '#4CAF50', // Xanh lá cho ngưỡng thấp
            colorMedium: '#FFC107', // Vàng cho ngưỡng trung bình
            colorStop: '#F44336',  // Đỏ cho ngưỡng cao
            strokeColor: '#E0E0E0',
            generateGradient: true,
            percentColors: [
                [0.0, "#4CAF50"],
                [0.5, "#FFC107"],
                [1.0, "#F44336"]
            ],
            maxValue: 100,
            minorTicks: 5
        });

        // Cập nhật dữ liệu nhiệt độ realtime
        function updateTemperatureData(newTemp) {
            // Cập nhật giá trị hiển thị
            document.getElementById('current-temp').textContent = newTemp.toFixed(1);
            
            // Thay đổi màu sắc theo ngưỡng
            if(newTemp < 25) {
                document.querySelector('.temp-value').style.color = '#4CAF50';
            } else if(newTemp < 35) {
                document.querySelector('.temp-value').style.color = '#FFC107';
            } else {
                document.querySelector('.temp-value').style.color = '#F44336';
            }

            // Cập nhật gauge
            gauge.set(newTemp / 100);
        }

        // Mẫu dữ liệu test - thay thế bằng API lấy dữ liệu thực tế từ hệ thống E-Ra
        setInterval(() => {
            const mockTemp = 25 + Math.random() * 15;
            updateTemperatureData(mockTemp);
        }, 3000);

        // Khởi tạo gauge
        gauge.maxValue = 100;
        gauge.setMinValue(0);
        gauge.set(0.299);
    </script>
</body>
</html>
