<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Radiation Gauge (W/m²)</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#f5f5f5;
}

h2{
    margin-bottom:10px;
}

#wrapper{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h2>BỨC XẠ MẶT TRỜI (W/m²)</h2>

<div id="wrapper">
<canvas id="gauge" width="300" height="300"></canvas>
</div>

<script>

const canvas = document.getElementById("gauge");
const ctx = canvas.getContext("2d");

let value = 0;

// vẽ gauge
function drawGauge(val){
    ctx.clearRect(0,0,300,300);

    let cx = 150;
    let cy = 150;
    let r = 110;

    // cung tròn
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI, 2*Math.PI);

    // màu theo ngưỡng
    if(val < 200) ctx.strokeStyle = "green";
    else if(val < 600) ctx.strokeStyle = "orange";
    else ctx.strokeStyle = "red";

    ctx.lineWidth = 18;
    ctx.stroke();

    // kim
    let angle = Math.PI + (val/1000)*Math.PI;

    let x = cx + r * Math.cos(angle);
    let y = cy + r * Math.sin(angle);

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.strokeStyle = "black";
    ctx.lineWidth = 4;
    ctx.stroke();

    // tâm
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, 2*Math.PI);
    ctx.fillStyle = "black";
    ctx.fill();

    // text
    ctx.font = "22px Arial";
    ctx.fillStyle = "#333";
    ctx.fillText(val.toFixed(0) + " W/m²", 80, 270);
}


// ===============================
//  NHẬN DỮ LIỆU THẬT TỪ CẢM BIẾN
// ===============================

// ESP32 phải trả về dạng:
// 123.45 (chỉ số W/m²)

async function getData(){
    try{
        let res = await fetch("http://192.168.1.100/data"); 
        let text = await res.text();

        value = parseFloat(text);

        if(isNaN(value)) value = 0;

        drawGauge(value);
    }
    catch(e){
        console.log("Lỗi kết nối ESP32");
    }
}

// cập nhật mỗi 1 giây
setInterval(getData, 1000);

// vẽ ban đầu
drawGauge(0);

</script>

</body>
</html>
