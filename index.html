<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauge Nhiệt Độ THREP</title></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .temperature-gauge-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .gauge-title {
            font-size: 1.8rem;
            color: #212121;
            margin-bottom: 20px;
            font-weight: 500;
        }
        #gauge-temperature {
            position: relative;
            width: 380px;
            height: 380px;
        }
    </style>
</head>
<body>
    <div class="temperature-gauge-container">
        <h2 class="gauge-title">Nhiệt độ</h2>
        <div id="gauge-temperature"></div>
    </div>

    <script>
        // --- Khởi tạo biểu đồ gauge với kim và 3 ngưỡng màu ---
        const tempGauge = new JustGage({
            id: "gauge-temperature",
            value: 0,
            min: 0,
            max: 100,
            title: "",
            label: "°C",
            levelColors: [
                "#4CAF50", // Xanh lá: 0 → 25°C
                "#FFC107", // Vàng: 25 → 35°C
                "#F44336"  // Đỏ: >35°C
            ],
            levelColorsGradient: false,
            showInnerShadow: true,
            pointer: true,
            pointerOptions: {
                strokeWidth: 4,
                color: "#000000"
            },
            showPercentage: false,
            showValues: true,
            valueFontColor: "#212121",
            customSectors: [{
                color: "#4CAF50",
                lo: 0,
                hi: 25
            }, {
                color: "#FFC107",
                lo: 25,
                hi: 35
            }, {
                color: "#F44336",
                lo: 35,
                hi: 100
            }],
            gaugeWidthScale: 0.6
        });

        // --- Cập nhật dữ liệu nhiệt độ thực tế từ hệ thống E-Ra ---
        function updateTemperatureData() {
            let realTemp = null;

            // 👉 Cách 1: Lấy dữ liệu từ tham số URL (nếu E-Ra truyền qua ?temp=giá_trị)
           const urlParams = new URLSearchParams(window.location.search);
           if(urlParams.has('temp')) {
               realTemp = parseFloat(urlParams.get('temp'));
            }

            // 👉 Cách 2: Lấy dữ liệu từ biến toàn cục do E-Ra inject (nếu bạn không dùng tham số URL)
            // if(window.ERaDashboard && window.ERaDashboard.currentTemperature) {
            //     realTemp = window.ERaDashboard.currentTemperature;
            // }

            // Cập nhật biểu đồ nếu có dữ liệu hợp lệ
            //if(realTemp !== null && !isNaN(realTemp) && realTemp >=0 && realTemp <=100) {
            //    tempGauge.refresh(realTemp);
           // } else {
                // Sử dụng giá trị mặc định nếu không nhận được dữ liệu
            //    tempGauge.refresh(29.9);
         //   }
        }

        // Tự động cập nhật dữ liệu mỗi 3 giây theo yêu cầu thực tế
        setInterval(updateTemperatureData, 3000);

        // Khởi tạo lần đầu khi load trang
        updateTemperatureData();
    </script>
</body>
</html>
